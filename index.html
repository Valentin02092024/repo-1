<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Nota de venta</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 20px;
    }
    h1 {
      text-align: center;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      max-width: 900px;
      margin-bottom: 20px;
    }
    th, td {
      border: 1px solid #777;
      padding: 6px;
      text-align: center;
    }
    th {
      background-color: #eee;
    }
    input[type="number"],
    input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      text-align: center;
    }
    input[readonly] {
      background-color: #f9f9f9;
    }
    .acciones button {
      width: 100%;
    }
    .totales {
      max-width: 400px;
      margin-top: 10px;
    }
    .totales label {
      display: block;
      margin: 6px 0 2px;
    }
    .totales input {
      width: 100%;
      box-sizing: border-box;
    }
    #btnCalcularTodo {
      padding: 8px 16px;
      margin-bottom: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>NOTA DE VENTA</h1>

  <table>
    <thead>
      <tr>
        <th>CANT.</th>
        <th>PRODUCTO</th>
        <th>PRECIO</th>
        <th>ACCIÓN 1</th>
        <th>IMPORTE</th>
        <th>% DESC</th>
        <th>ACCIÓN 2</th>
        <th>DESC</th>
        <th>IMPORTE FINAL</th>
      </tr>
    </thead>
    <tbody id="detalle">
      <!-- Puedes duplicar estas filas si quieres más renglones -->
      <tr>
        <td><input type="number" class="cantidad" min="0" step="1"></td>
        <td><input type="text" class="producto"></td>
        <td><input type="number" class="precio" min="0" step="0.01"></td>
        <td class="acciones">
          <button type="button" onclick="calcularFilaImporte(this)">Calcular 1</button>
        </td>
        <td><input type="number" class="importe" readonly></td>
        <td><input type="number" class="porc-desc" min="0" max="100" step="0.01"></td>
        <td class="acciones">
          <button type="button" onclick="calcularFilaDescuento(this)">Calcular 2</button>
        </td>
        <td><input type="number" class="descuento" readonly></td>
        <td><input type="number" class="importe-final" readonly></td>
      </tr>

      <tr>
        <td><input type="number" class="cantidad" min="0" step="1"></td>
        <td><input type="text" class="producto"></td>
        <td><input type="number" class="precio" min="0" step="0.01"></td>
        <td class="acciones">
          <button type="button" onclick="calcularFilaImporte(this)">Calcular 1</button>
        </td>
        <td><input type="number" class="importe" readonly></td>
        <td><input type="number" class="porc-desc" min="0" max="100" step="0.01"></td>
        <td class="acciones">
          <button type="button" onclick="calcularFilaDescuento(this)">Calcular 2</button>
        </td>
        <td><input type="number" class="descuento" readonly></td>
        <td><input type="number" class="importe-final" readonly></td>
      </tr>

      <tr>
        <td><input type="number" class="cantidad" min="0" step="1"></td>
        <td><input type="text" class="producto"></td>
        <td><input type="number" class="precio" min="0" step="0.01"></td>
        <td class="acciones">
          <button type="button" onclick="calcularFilaImporte(this)">Calcular 1</button>
        </td>
        <td><input type="number" class="importe" readonly></td>
        <td><input type="number" class="porc-desc" min="0" max="100" step="0.01"></td>
        <td class="acciones">
          <button type="button" onclick="calcularFilaDescuento(this)">Calcular 2</button>
        </td>
        <td><input type="number" class="descuento" readonly></td>
        <td><input type="number" class="importe-final" readonly></td>
      </tr>
    </tbody>
  </table>

  <button id="btnCalcularTodo" type="button" onclick="calcularTodo()">Calcular Todo</button>

  <div class="totales">
    <label>Importe sin descuento:</label>
    <input type="number" id="importeSinDesc" readonly>

    <label>Descuento total:</label>
    <input type="number" id="descuentoTotal" readonly>

    <label>Importe total final:</label>
    <input type="number" id="importeFinalTotal" readonly>
  </div>

  <script>
    // Calcula IMPORTE = CANTIDAD * PRECIO de la fila
    function calcularFilaImporte(boton) {
      const fila = boton.closest("tr");
      const cantidad = parseFloat(fila.querySelector(".cantidad").value) || 0;
      const precio = parseFloat(fila.querySelector(".precio").value) || 0;

      const importe = cantidad * precio;
      fila.querySelector(".importe").value = importe ? importe.toFixed(2) : "";
    }

    // Calcula DESC (en pesos) e IMPORTE FINAL usando el % DESC
    function calcularFilaDescuento(boton) {
      const fila = boton.closest("tr");
      const importe = parseFloat(fila.querySelector(".importe").value) || 0;
      const porcDesc = parseFloat(fila.querySelector(".porc-desc").value) || 0;

      const descuento = importe * (porcDesc / 100);
      const total = importe - descuento;

      fila.querySelector(".descuento").value = descuento ? descuento.toFixed(2) : "";
      fila.querySelector(".importe-final").value = total ? total.toFixed(2) : "";
    }

    // Recorre todas las filas, recalcula y suma totales
    function calcularTodo() {
      const filas = document.querySelectorAll("#detalle tr");
      let totalSinDesc = 0;
      let totalDesc = 0;
      let totalFinal = 0;

      filas.forEach(fila => {
        const cantidad = parseFloat(fila.querySelector(".cantidad").value) || 0;
        const precio = parseFloat(fila.querySelector(".precio").value) || 0;
        const porcDesc = parseFloat(fila.querySelector(".porc-desc").value) || 0;

        const importe = cantidad * precio;
        fila.querySelector(".importe").value = importe ? importe.toFixed(2) : "";

        const descuento = importe * (porcDesc / 100);
        const final = importe - descuento;

        fila.querySelector(".descuento").value = descuento ? descuento.toFixed(2) : "";
        fila.querySelector(".importe-final").value = final ? final.toFixed(2) : "";

        totalSinDesc += importe;
        totalDesc += descuento;
        totalFinal += final;
      });

      document.getElementById("importeSinDesc").value =
        totalSinDesc ? totalSinDesc.toFixed(2) : "";
      document.getElementById("descuentoTotal").value =
        totalDesc ? totalDesc.toFixed(2) : "";
      document.getElementById("importeFinalTotal").value =
        totalFinal ? totalFinal.toFixed(2) : "";
    }
  </script>
</body>
</html>
